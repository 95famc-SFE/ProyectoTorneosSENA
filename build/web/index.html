<!DOCTYPE html>
<html>
<head>
    <title>Registro de Nuevo Equipo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #e53935; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; transition: background-color 0.3s; }
        button:hover { background-color: #b71c1c }
    </style>
</head>
<body>

    <h2>Registro de Nuevo Equipo</h2>

    <form action="RegistroServlet" method="POST">
        
        <div>
            <label>Nombre del Equipo:</label>
            <input type="text" name="nombre_equipo" placeholder="Ej: DAGO X SIEMPRE" required>
        </div>

        <div>
            <label>Categoría:</label>
            <select name="categoria">
                <option value="Juvenil">Juvenil</option>
                <option value="Veteranos">Veteranos</option>
                <option value="Profesional">Profesional</option>
            </select>
        </div>

        <div>
            <label>Nombre del Capitán:</label>
            <input type="text" name="capitan" placeholder="Nombre del líder" required>
        </div>

        <div>
            <label>ID del Torneo (Número):</label>
            <input type="number" name="idTorneo" value="1" required>
        </div>

        <div>
            <button type="submit">Registrar Equipo en el Sistema</button>
        </div>

    </form>

</body>
</html>
